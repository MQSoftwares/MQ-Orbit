<svg xmlns="http://www.w3.org/2000/svg" width="120" height="60" viewBox="0 0 120 60" fill="none">
  <defs>
    <linearGradient id="bgDark" x1="6" y1="10" x2="114" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F487A"/>
      <stop offset="62%" stop-color="#335EAE"/>
      <stop offset="100%" stop-color="#18A7A6"/>
    </linearGradient>
    <radialGradient id="knobMoon" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(30 29) rotate(50) scale(22 22)">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#DDEBF2"/>
    </radialGradient>
    <filter id="shadowDark" x="0" y="0" width="120" height="60" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.2" flood-color="#08233F" flood-opacity="0.18"/>
