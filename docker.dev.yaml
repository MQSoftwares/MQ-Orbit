services:
  mqorbit:
    container_name: mqorbit-dev
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "rm -rf .next-codex && npm run dev"
    ports:
      - "3100:3100"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      PORT: "3100"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
